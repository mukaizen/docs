version: "3.9"

# ─── Local Development Stack ──────────────────────────────────────────────────
# Start everything:  docker compose up
# Start only infra:  docker compose up postgres redis
# Run migrations:    docker compose run --rm web python manage.py migrate
# Create superuser:  docker compose run --rm web python manage.py createsuperuser
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       myproject
      POSTGRES_USER:     myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d myproject"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Django Web ───────────────────────────────────────────────────────────────
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://myuser:mypassword@postgres:5432/myproject
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery:
    build: .
    command: celery -A config.celery_app worker -l info --concurrency 2
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://myuser:mypassword@postgres:5432/myproject
      CELERY_BROKER_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  # ── Celery Beat (periodic tasks) ─────────────────────────────────────────────
  celery-beat:
    build: .
    command: celery -A config.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://myuser:mypassword@postgres:5432/myproject
      CELERY_BROKER_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  media_files:
