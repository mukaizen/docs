{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-container">
  <h1>Reset Password</h1>
  <p>Enter your email and we'll send you a reset link.</p>
  <form method="post" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send Reset Link</button>
  </form>
</div>
{% endblock %}
