{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="profile-edit">
  <h1>Edit Profile</h1>
  <form method="post" enctype="multipart/form-data" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Changes</button>
    <a href="{% url 'users:profile' %}">Cancel</a>
  </form>
</div>
{% endblock %}
