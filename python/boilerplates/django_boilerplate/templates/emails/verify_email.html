<!DOCTYPE html>
<html>
<head><meta charset="UTF-8" /><title>Verify Your Email</title></head>
<body style="font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h1>Verify your email address</h1>
  <p>Hi {{ user.get_short_name }}, click the button below to verify your email.</p>
  <p><a href="{{ verification_url }}" style="background:#2563eb;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;">Verify Email</a></p>
  <p>Or copy this link: <br /><code>{{ verification_url }}</code></p>
  <p style="color:#6b7280;font-size:12px;">If you didn't create an account, ignore this email.</p>
</body>
</html>
