<!DOCTYPE html>
<html>
<head><meta charset="UTF-8" /><title>Reset Your Password</title></head>
<body style="font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h1>Password Reset</h1>
  <p>You requested a password reset. Click below to choose a new password.</p>
  <p><a href="{{ protocol }}://{{ domain }}{% url 'users:password_reset_confirm' uidb64=uid token=token %}"
        style="background:#2563eb;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;">
    Reset Password
  </a></p>
  <p>This link expires in 24 hours.</p>
  <p style="color:#6b7280;font-size:12px;">If you didn't request this, ignore this email — your password won't change.</p>
</body>
</html>
