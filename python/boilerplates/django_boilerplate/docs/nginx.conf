# ─── Nginx configuration for Django + Gunicorn ────────────────────────────────
# Place at: /etc/nginx/sites-available/myproject
# Enable:   ln -s /etc/nginx/sites-available/myproject /etc/nginx/sites-enabled/
# Reload:   nginx -t && systemctl reload nginx

upstream django_app {
    server 127.0.0.1:8000 fail_timeout=0;
    # Add more Gunicorn workers/servers for load balancing:
    # server 127.0.0.1:8001 fail_timeout=0;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name example.com www.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com www.example.com;

    # ── SSL ───────────────────────────────────────────────────────────────────
    # Use certbot to generate: certbot --nginx -d example.com
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff                                        always;
    add_header X-Frame-Options           DENY                                           always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # ── Sizes & timeouts ──────────────────────────────────────────────────────
    client_max_body_size 20M;
    keepalive_timeout    65;

    # ── Static files (served by Nginx — much faster than Gunicorn) ────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── Media files ───────────────────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # ── Proxy all other requests to Gunicorn ──────────────────────────────────
    location / {
        proxy_pass         http://django_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 120;
        proxy_buffering    on;
    }

    # ── Health check (no logging) ─────────────────────────────────────────────
    location = /core/health/ {
        proxy_pass http://django_app;
        access_log off;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~ /\.git            { deny all; }
    location ~ /\.env            { deny all; }
    location ~ /requirements     { deny all; }
}
